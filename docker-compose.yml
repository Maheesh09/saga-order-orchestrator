services:
  postgres-order:
    image: postgres:16-alpine
    container_name: order-service-db
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    ports:
      - "5432:5432"
    volumes:
      - order-postgres-data:/var/lib/postgresql/data

volumes:
  order-postgres-data: