spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:postgresql://localhost:5434/inventorydb
    username: inventory_user
    password: inventory_pass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: inventory-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.saga.inventoryservice.event"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.saga.inventoryservice.event.StockReservationRequested
saga:
  topics:
    stock-reservation-requested: stock-reservation-requested
    stock-reservation-result: stock-reservation-result

server:
  port: 8082