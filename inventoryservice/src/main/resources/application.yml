spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:postgresql://localhost:5434/inventorydb
    username: inventory_user
    password: inventory_pass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8082